<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bolão da Copa | Meus Palpites</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" 
    rel="stylesheet"
  >

  <link rel="stylesheet" href="./src/css/base/reset.css">
  <link rel="stylesheet" href="./src/css/base/variables.css">
  <link rel="stylesheet" href="./src/css/base/global.css">

  <link rel="stylesheet" href="./src/css/components/button.css">
  <link rel="stylesheet" href="./src/css/components/card.css">
  <link rel="stylesheet" href="./src/css/components/form.css">
  <link rel="stylesheet" href="./src/css/components/toast.css">

  <link rel="stylesheet" href="./src/css/pages/dashboard.css">
  <link rel="stylesheet" href="./src/css/pages/predictions.css">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <span>🏆</span>
        <strong>Bolão Copa</strong>
      </div>

      <nav class="sidebar__nav">
        <a href="./dashboard.html" class="sidebar__link">Dashboard</a>
        <a href="./predictions.html" class="sidebar__link sidebar__link--active">Meus palpites</a>
        <a href="./groups.html" class="sidebar__link">Grupos</a>
        <a href="./special-predictions.html" class="sidebar__link">Especiais</a>
        <a href="./ranking.html" class="sidebar__link">Ranking</a>
        <a href="./admin.html" class="sidebar__link">Admin</a>
      </nav>

      <button id="logoutButton" class="button button--ghost sidebar__logout">
        Sair
      </button>
    </aside>

    <main class="predictions-page">
      <header class="predictions-header">
        <div>
          <p class="dashboard__eyebrow">Palpites da Copa</p>
          <h1>Meus palpites</h1>
          <p>
            Preencha os placares dos jogos. Cada palpite pode ser alterado até 1 minuto antes do jogo começar.
          </p>
        </div>

        <button id="themeToggle" class="button button--ghost">
          Alternar tema
        </button>
      </header>

      <section class="predictions-summary">
        <article class="card predictions-summary__card">
          <span>Jogos disponíveis</span>
          <strong id="totalMatches">0</strong>
        </article>

        <article class="card predictions-summary__card">
          <span>Palpites feitos</span>
          <strong id="totalPredictions">0</strong>
        </article>

        <article class="card predictions-summary__card">
          <span>Bloqueados</span>
          <strong id="totalLocked">0</strong>
        </article>
      </section>
      
      <section class="predictions-filter-area">
        <div class="predictions-filter-group card">
          <div class="predictions-filter-group__header">
            <span>Filtrar por grupo</span>
          </div>

          <div class="predictions-filters" id="groupFilters">
            <button class="filter-button is-active" data-group="all">Todos</button>
            <button class="filter-button" data-group="Grupo A">Grupo A</button>
            <button class="filter-button" data-group="Grupo B">Grupo B</button>
            <button class="filter-button" data-group="Grupo C">Grupo C</button>
            <button class="filter-button" data-group="Grupo D">Grupo D</button>
            <button class="filter-button" data-group="Grupo E">Grupo E</button>
            <button class="filter-button" data-group="Grupo F">Grupo F</button>
            <button class="filter-button" data-group="Grupo G">Grupo G</button>
            <button class="filter-button" data-group="Grupo H">Grupo H</button>
            <button class="filter-button" data-group="Grupo I">Grupo I</button>
            <button class="filter-button" data-group="Grupo J">Grupo J</button>
            <button class="filter-button" data-group="Grupo K">Grupo K</button>
            <button class="filter-button" data-group="Grupo L">Grupo L</button>
          </div>
        </div>

        <div class="predictions-filter-group card">
          <div class="predictions-filter-group__header">
            <span>Filtrar por rodada</span>
          </div>

          <div class="predictions-filters" id="roundFilters">
            <button class="filter-button is-active" data-round="all">Todas</button>
            <button class="filter-button" data-round="1">1ª rodada</button>
            <button class="filter-button" data-round="2">2ª rodada</button>
            <button class="filter-button" data-round="3">3ª rodada</button>
          </div>
        </div>
      </section>

      <section id="matchesList" class="matches-list"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./src/js/pages/predictions-page.js"></script>
</body>
</html>
